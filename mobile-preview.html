<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Мобильный предпросмотр — Pifagor Trade</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            font-family: system-ui, sans-serif;
            color: #9ca3af;
        }
        .preview-wrap {
            /* iPhone 17: рамка с алюминиевым видом */
            background: linear-gradient(145deg, #2c2c2e 0%, #1c1c1e 50%, #252527 100%);
            border-radius: 55px;
            padding: 14px;
            box-shadow:
                0 30px 60px rgba(0,0,0,0.5),
                0 0 0 1px rgba(255,255,255,0.06),
                inset 0 1px 0 rgba(255,255,255,0.05);
        }
        .phone-frame {
            /* iPhone 17 (6.3"): экран 402×874 pt + рамка 14px */
            width: min(430px, 90vw);
            height: min(902px, 85vh);
            aspect-ratio: 430 / 902;
            border-radius: 48px;
            overflow: hidden;
            background: #000;
            position: relative;
            padding: 14px;
            box-shadow: inset 0 0 0 2px #1a1a1a;
        }
        /* Dynamic Island — iPhone 17 */
        .dynamic-island {
            position: absolute;
            top: 26px;
            left: 50%;
            transform: translateX(-50%);
            width: 126px;
            height: 37px;
            background: #000;
            border-radius: 20px;
            z-index: 10;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
        }
        /* Экран iPhone 17: 402×874 pt (точное соотношение сторон) */
        .phone-screen {
            width: 100%;
            height: 100%;
            aspect-ratio: 402 / 874;
            border-radius: 34px;
            overflow: hidden;
            background: #0f172a;
        }
        .phone-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .hint {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.85rem;
        }
        .hint a { color: #7c9ab8; }
    </style>
</head>
<body>
    <div>
        <div class="preview-wrap">
            <div class="phone-frame">
                <div class="dynamic-island" aria-hidden="true"></div>
                <div class="phone-screen">
                    <iframe id="frame" src="http://localhost:3000/indicators.html" title="Мобильный предпросмотр"></iframe>
                </div>
            </div>
        </div>
        <p class="hint">iPhone 17 (6.3"). Запустите сервер: <code>npm start</code>. <a href="http://localhost:3000/indicators.html" target="_blank">Открыть в новой вкладке</a></p>
    </div>
</body>
</html>
