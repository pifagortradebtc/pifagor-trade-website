<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <title>Мобильный вид — Pifagor Trade (онлайн)</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 20px; font-family: system-ui, sans-serif; background: #1e293b; color: #e2e8f0; }
        h1 { font-size: 1rem; margin-bottom: 1rem; }
        .phone-frame {
            width: 390px;
            height: 844px;
            margin: 0 auto;
            border: 12px solid #0f172a;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 0 0 2px #334155, 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .phone-frame iframe {
            width: 390px;
            height: 844px;
            border: none;
            display: block;
        }
        .hint { text-align: center; margin-top: 1rem; font-size: 0.875rem; color: #94a3b8; }
    </style>
</head>
<body>
    <h1>Мобильный вид pifagor.trade</h1>
    <div class="phone-frame">
        <iframe id="site-frame" src="https://www.pifagor.trade/?nocache=1" title="Pifagor Trade"></iframe>
    </div>
    <p class="hint">
        <strong>Онлайн:</strong> www.pifagor.trade
        | <a href="https://www.pifagor.trade" target="_blank" style="color:#60a5fa;">Открыть в новой вкладке</a>
        | <a href="?" style="color:#60a5fa;" onclick="document.getElementById('site-frame').src='https://www.pifagor.trade/?r='+Date.now();return false;">Обновить</a>
    </p>
    <p class="hint" style="margin-top:0.5rem;">Локально: откройте <code>http://localhost:3000/mobile-preview.html</code> когда сервер запущен</p>
</body>
</html>
