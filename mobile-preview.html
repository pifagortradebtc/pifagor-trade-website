<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Мобильный предпросмотр — Pifagor Trade</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            font-family: system-ui, sans-serif;
            color: #9ca3af;
        }
        .preview-wrap {
            background: #111;
            border-radius: 36px;
            padding: 12px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), 0 0 0 2px #333;
        }
        .phone-frame {
            width: 375px;
            height: 667px;
            max-height: 85vh;
            border-radius: 28px;
            overflow: hidden;
            background: #0f172a;
        }
        .phone-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .hint {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.85rem;
        }
        .hint a { color: #7c9ab8; }
    </style>
</head>
<body>
    <div>
        <div class="preview-wrap">
            <div class="phone-frame">
                <iframe id="frame" src="http://localhost:3000/indicators.html" title="Мобильный предпросмотр"></iframe>
            </div>
        </div>
        <p class="hint">Запустите сервер: <code>npm start</code>. <a href="http://localhost:3000/indicators.html" target="_blank">Открыть в новой вкладке</a></p>
    </div>
</body>
</html>
