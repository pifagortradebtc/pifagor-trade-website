<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подписчики — Pifagor Trade</title>
    <link rel="stylesheet" href="/styles.css?v=2">
    <style>
        .admin-page { max-width: 800px; margin: 2rem auto; padding: 1.5rem; }
        .admin-title { margin-bottom: 1rem; }
        .admin-key-form { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
        .admin-key-form input { flex: 1; padding: 0.5rem 0.75rem; border-radius: 6px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: var(--text); }
        .admin-list { background: rgba(30,41,59,0.6); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; }
        .admin-list-item { padding: 0.5rem 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .admin-list-item:last-child { border-bottom: none; }
        .admin-actions { margin-top: 1rem; display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .admin-error { color: #f87171; margin-top: 0.5rem; }
        .admin-count { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0.5rem; }
    </style>
</head>
<body>
    <div class="header-auth-bar">
        <a href="#" class="header-auth-btn header-auth-btn-login">Войти</a>
        <a href="#" class="header-auth-btn header-auth-btn-reg">Регистрация</a>
        <a href="profile.html" class="header-auth-user" id="header-auth-user" style="display:none" title="Мой профиль">Мой профиль</a>
    </div>
    <a href="support.html" class="support-fab" aria-label="Поддержка" title="Поддержка">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
    </a>
    <div class="page admin-page">
        <h1 class="admin-title">Подписчики на мероприятия</h1>
        <p class="admin-count" id="admin-hint">Введите ADMIN_KEY из .env и нажмите «Загрузить»</p>
        <form class="admin-key-form" id="admin-form">
            <input type="password" id="admin-key" placeholder="ADMIN_KEY" autocomplete="off">
            <button type="submit" class="btn btn-check" id="admin-load-btn">Загрузить</button>
        </form>
        <div id="admin-error" class="admin-error"></div>
        <div class="admin-list" id="admin-list" style="display:none;">
            <p class="admin-count" id="admin-count"></p>
            <div id="admin-items"></div>
            <div class="admin-actions">
                <button type="button" class="btn btn-check" id="export-csv">Экспорт в CSV</button>
            </div>
        </div>

    </div>
    <div id="login-modal" class="modal login-modal" role="dialog" aria-modal="true" aria-labelledby="login-modal-title" hidden>
        <div class="modal-backdrop" id="login-modal-backdrop"></div>
        <div class="modal-content login-modal-content">
            <button type="button" class="modal-close" id="login-modal-close" aria-label="Закрыть">&times;</button>
            <div class="login-modal-logo" aria-hidden="true">
                <svg class="login-modal-logo-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 14l9-5-9-5-9 5 9 5z" stroke="#57ff14" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" stroke="#57ff14" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h2 class="login-modal-title" id="login-modal-title">Войти на платформу</h2>
            <div class="login-modal-telegram" id="login-telegram-widget"></div>
        </div>
    </div>
    <script src="/api-config.js?v=1"></script>
    <script src="/js/auth-header.js"></script>
    <script src="/js/login-modal.js"></script>
    <script>
      (function () {
        var form = document.getElementById('admin-form');
        var keyInput = document.getElementById('admin-key');
        var listEl = document.getElementById('admin-list');
        var itemsEl = document.getElementById('admin-items');
        var countEl = document.getElementById('admin-count');
        var errorEl = document.getElementById('admin-error');
        var exportBtn = document.getElementById('export-csv');

        var params = new URLSearchParams(location.search);
        if (params.get('key')) {
          keyInput.value = params.get('key');
        }

        var loadBtn = document.getElementById('admin-load-btn');

        function load() {
          var key = (keyInput && keyInput.value || '').trim();
          if (!key) {
            errorEl.textContent = 'Введите ADMIN_KEY';
            listEl.style.display = 'none';
            return Promise.resolve();
          }

          errorEl.textContent = '';
          if (loadBtn) {
            loadBtn.disabled = true;
            loadBtn.classList.add('btn-loading');
          }
          var apiBase = window.API_BASE || '/api';
          return fetch(apiBase + '/subscribers?key=' + encodeURIComponent(key))
            .then(function (r) {
              if (!r.ok) throw new Error(r.status === 403 ? 'Неверный ключ' : 'Ошибка загрузки');
              return r.json();
            })
            .then(function (data) {
              listEl.style.display = 'block';
              window._subscribersList = data.subscribers || [];
              if (data.useGoogleSheet) {
                countEl.textContent = 'Данные сохраняются в Google Таблице';
                exportBtn.style.display = 'none';
                if (data.googleSheetUrl) {
                  itemsEl.innerHTML = '<div class="admin-list-item" style="border-bottom:none;flex-direction:column;align-items:flex-start;gap:0.5rem;"><p style="margin:0;color:var(--text-muted);">Подписчики и рефералы записываются в листы «Путешествия» и «Рефералы».</p><a href="' + data.googleSheetUrl + '" target="_blank" rel="noopener noreferrer" class="btn btn-check" style="display:inline-block;text-decoration:none;">Открыть Google Таблицу</a></div>';
                } else {
                  itemsEl.innerHTML = '<div class="admin-list-item" style="border-bottom:none;"><p style="margin:0;color:var(--text-muted);">Настройте GOOGLE_SHEET_URL в .env для ссылки на таблицу.</p></div>';
                }
              } else {
                exportBtn.style.display = '';
                countEl.textContent = 'Всего: ' + window._subscribersList.length + ' подписчик(ов)';
                itemsEl.innerHTML = window._subscribersList.map(function (s) {
                  return '<div class="admin-list-item"><span>' + (s.email || '') + '</span><span style="color:var(--text-muted);font-size:0.85rem">' + (s.date ? s.date.slice(0, 10) : '') + '</span></div>';
                }).join('');
              }
            })
            .catch(function (err) {
              errorEl.textContent = err.message || 'Ошибка';
              listEl.style.display = 'none';
            })
            .finally(function () {
              if (loadBtn) {
                loadBtn.disabled = false;
                loadBtn.classList.remove('btn-loading');
              }
            });
        }

        if (form) {
          form.addEventListener('submit', function (e) {
            e.preventDefault();
            load();
          });
        }

        if (exportBtn) {
          exportBtn.addEventListener('click', function () {
            var list = window._subscribersList || [];
            if (list.length === 0) {
              alert('Нет данных для экспорта');
              return;
            }
            var csv = 'email,date\n' + list.map(function (s) {
              return '"' + (s.email || '').replace(/"/g, '""') + '","' + (s.date || '') + '"';
            }).join('\n');
            var blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
            var a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'subscribers-' + new Date().toISOString().slice(0, 10) + '.csv';
            a.click();
            URL.revokeObjectURL(a.href);
          });
        }
      })();
    </script>
    <script src="/js/page-loading.js"></script>
</body>
</html>
